name: Weekly SG Real-Estate Review

on:
  schedule:
    # cron is in UTC. 10:00 UTC Sunday = 18:00 (6pm) Sunday in Singapore (UTC+8),
    # so it runs after the whole week's dailies are done.
    - cron: "0 10 * * 0"
  workflow_dispatch:        # run manually from the Actions tab to test

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly review
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python weekly.py
